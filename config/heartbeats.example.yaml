# Heartbeats — Proactive Agent Configuration (Example)
# Copy of the live Sistema Britto configuration with sensitive values
# replaced by placeholders. Use this as a reference or template.
#
# The real configuration is in heartbeats.yaml (gitignored).
#
# Fields:
#   id                 — unique slug (kebab-case)
#   agent              — agent file stem from .claude/agents/ (without .md)
#   interval_seconds   — minimum 60; use multiples of 3600 for hourly cadences
#   max_turns          — hard cap on Claude turns per run (default: 10)
#   timeout_seconds    — hard kill timeout for subprocess (default: 600)
#   lock_timeout_seconds — stale lock cleanup threshold (default: 1800)
#   wake_triggers      — list from: [interval, new_task, mention, manual, approval_decision]
#   enabled            — false = dormant; set true via UI toggle or YAML edit to activate
#   goal_id            — (optional) links to a goal for context injection
#   required_secrets   — list of .env key names this agent needs at runtime
#   decision_prompt    — the decision question the agent answers in step 4 of the protocol
#   handler            — (optional) Python module.function for in-process handlers.
#                        If set, heartbeat_runner calls this function directly instead of
#                        spawning a Claude CLI subprocess. max_turns must be 0.
#                        Format: "module_name.function_name"
#
# IMPORTANT: All seeds start with enabled: false in this example.
# Enable individually via UI toggle after reviewing.

heartbeats:

  # Atlas — Project pipeline check every 4 hours
  # Monitors Evo CRM for leads stuck in early stages and checks Nexus tickets/goal_tasks
  # assigned to atlas-project. No longer uses Linear or GitHub.
  - id: atlas-4h
    agent: atlas-project
    interval_seconds: 14400  # 4 hours
    max_turns: 10
    timeout_seconds: 300
    lock_timeout_seconds: 1800
    wake_triggers:
      - interval
      - mention
      - manual
    enabled: false
    goal_id: null
    required_secrets:
      - EVO_CRM_TOKEN  # API token for int-evo-crm skill
    decision_prompt: >
      You are Atlas, the project agent. Linear/GitHub triage is retired — Felipe
      manages the sales pipeline via Evo CRM (int-evo-crm skill, pipelines/stages/items)
      and delivery work via the Nexus dashboard itself (tickets and goal_tasks in this
      workspace DB). Check Evo CRM pipelines for items stuck in an early stage (e.g.
      "Novo Lead") for more than 3 days with no stage change or follow-up. Check Nexus
      tickets with status open/in_progress assigned to you (atlas-project) and overdue
      goal_tasks. Decide: should you act now (follow up on a stuck lead, comment/triage
      a ticket, escalate) or is there nothing urgent? Respond with JSON:
      {"action": "work"|"skip", "reason": "<1 sentence>",
      "tasks": [<list of pipeline item ids or ticket ids to touch, if action=work>]}.

  # Zara — Customer support queue triage every 2 hours
  # Scans the Nexus ticket system for open/pending tickets assigned to zara-cs.
  # Picks the highest-priority item and decides whether to act.
  - id: zara-2h
    agent: zara-cs
    interval_seconds: 7200  # 2 hours
    max_turns: 15
    timeout_seconds: 300
    lock_timeout_seconds: 1800
    wake_triggers:
      - interval
      - new_task
      - manual
    enabled: false
    goal_id: null
    required_secrets: []
    decision_prompt: >
      You are Zara, the customer success agent. Check the support queue for tickets
      with status "open" or "pending" assigned to you. Pick the highest-priority ticket
      (by urgency label, then oldest created_at). Decide: should you work on it now
      or is the queue empty/nothing actionable? Respond with JSON:
      {"action": "work"|"skip", "reason": "<1 sentence>",
      "ticket_id": "<id or null>"}.

  # Flux — Payments and financial alerts every 6 hours
  # Checks AbacatePay for failed/pending PIX or boleto payments and Evo CRM
  # for billing items needing attention. No longer uses Stripe or Omie.
  - id: flux-6h
    agent: flux-finance
    interval_seconds: 21600  # 6 hours
    max_turns: 10
    timeout_seconds: 300
    lock_timeout_seconds: 1800
    wake_triggers:
      - interval
      - manual
    enabled: false
    goal_id: null
    required_secrets:
      - ABACATEPAY_API_KEY  # AbacatePay API key for payment checks
      - EVO_CRM_TOKEN       # API token for int-evo-crm billing items
    decision_prompt: >
      You are Flux, the finance agent. Check AbacatePay (list_checkouts,
      list_transparent via the custom-int-abacatepay skill) for failed or pending
      PIX/boleto payments in the last 6 hours. Check Evo CRM (int-evo-crm skill)
      for billing/CRM items that need action. Decide: is there something urgent
      requiring action or escalation to Felipe via Telegram? Respond with JSON:
      {"action": "work"|"skip", "reason": "<1 sentence>",
      "alerts": [<list of critical items, if any>]}.

  # goal-planner — decomposes a human-authored top-level Goal into tickets.
  # Event-driven only: wakes on goal_created (fired by POST /api/goals when a
  # Goal with no parent_goal_id is created), not on an interval. interval_seconds
  # is a required field but never fires a job since "interval" isn't in
  # wake_triggers. See .claude/agents/goal-planner.md.
  - id: goal-planner
    agent: goal-planner
    interval_seconds: 86400  # unused placeholder — no "interval" wake trigger
    max_turns: 15
    timeout_seconds: 300
    lock_timeout_seconds: 1800
    wake_triggers:
      - goal_created
      - manual
    enabled: false
    goal_id: null
    required_secrets: []
    decision_prompt: >
      You are goal-planner. A top-level Goal was just created — its id is in the
      Trigger payload above. Decompose it into 2-6 concrete, assignable tickets
      per your agent instructions (.claude/agents/goal-planner.md), or skip if it
      already has tickets (idempotency) or there is no goal_id in the trigger
      payload.

  # project-planner — proposes Projects for a human-authored Mission.
  # Event-driven only: wakes on mission_created. See .claude/agents/project-planner.md.
  - id: project-planner
    agent: project-planner
    interval_seconds: 86400  # unused placeholder — no "interval" wake trigger
    max_turns: 15
    timeout_seconds: 300
    lock_timeout_seconds: 1800
    wake_triggers:
      - mission_created
      - manual
    enabled: false
    goal_id: null
    required_secrets: []
    decision_prompt: >
      You are project-planner. A Mission was just created — its id is in the
      Trigger payload above. Propose 1-4 Projects per your agent instructions
      (.claude/agents/project-planner.md) via POST /api/approvals
      (gate_type=project_suggestion) — never create a Project directly. Skip
      if it already has Projects (idempotency) or there is no mission_id in
      the trigger payload.

  # goal-suggester — proposes Goals for a Project (human-created, or itself
  # created from an approved project-planner proposal — intentional cascade).
  # Event-driven only: wakes on project_created. See .claude/agents/goal-suggester.md.
  - id: goal-suggester
    agent: goal-suggester
    interval_seconds: 86400  # unused placeholder — no "interval" wake trigger
    max_turns: 15
    timeout_seconds: 300
    lock_timeout_seconds: 1800
    wake_triggers:
      - project_created
      - manual
    enabled: false
    goal_id: null
    required_secrets: []
    decision_prompt: >
      You are goal-suggester. A Project was just created — its id is in the
      Trigger payload above. Propose 2-6 measurable Goals per your agent
      instructions (.claude/agents/goal-suggester.md) via POST /api/approvals
      (gate_type=goal_suggestion) — never create a Goal directly. Skip if it
      already has Goals (idempotency) or there is no project_id in the
      trigger payload.

  # pixel-growth-6h — keeps the content-ticket queue topped up for any Goal
  # Pixel already touches, so the growth funnel never stalls between human
  # check-ins. State-monitor agent (see STATE_MONITOR_AGENTS in
  # heartbeat_runner.py) — it must run even with an empty ticket inbox,
  # because an empty inbox for a content Goal is exactly the case it exists
  # to fix. See workspace/development/features/growth-content-heartbeat/.
  - id: pixel-growth-6h
    agent: pixel-social-media
    interval_seconds: 21600  # 6 hours — content isn't as time-urgent as CS/finance
    max_turns: 15
    timeout_seconds: 300
    lock_timeout_seconds: 1800
    wake_triggers:
      - interval
      - manual
      - mention
    enabled: false
    goal_id: null
    required_secrets: []
    decision_prompt: >
      You are Pixel, the social media agent, waking up in growth-heartbeat
      mode to keep the content pipeline full — not to write content directly.
      List active Goals (GET /api/goals?status=active) that already have at
      least one ticket assigned to you (GET /api/tickets?assignee_agent=pixel-social-media&goal_id=<id>)
      — those are the content/growth Goals you own. For each, count YOUR
      tickets in status open/in_progress linked to it. If that count is below
      3 and the Goal is not achieved/cancelled/past its due_date, propose up to
      3 new, concrete content tickets (specific titles, not generic "create a
      post") via POST /api/tickets with assignee_agent=pixel-social-media and
      goal_id set — check existing titles first so you never propose a near-
      duplicate. Never set publish_intent here or publish anything directly —
      that stays gated behind the existing Telegram approval + Postiz
      confirmation flow. If every Goal you own already has enough queued
      work, action=skip. Respond with JSON:
      {"action": "work"|"skip", "reason": "<1 sentence>",
      "goals_topped_up": [<list of goal ids you created tickets for, if any>]}.

  # integrations-health — Wave 2.2r in-process HTTP health check for plugin integrations
  # Runs every 15 minutes; zero Claude CLI invocations (in-process Python handler).
  # Enable via UI toggle after reviewing plugin integrations in /integrations.
  - id: integrations-health
    agent: system
    interval_seconds: 900  # 15 minutes
    max_turns: 0
    timeout_seconds: 60
    lock_timeout_seconds: 1800
    wake_triggers:
      - interval
      - manual
    enabled: false
    goal_id: null
    required_secrets: []
    handler: plugin_integration_health.tick
    decision_prompt: ""
